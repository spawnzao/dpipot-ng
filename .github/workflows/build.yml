name: build and push images

on:
  push:
    branches:
      - main
    paths:
      - 'proxy/**'
      - 'classifier/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/dpipot-proxy
  CLASSIFIER_IMAGE: ghcr.io/${{ github.repository_owner }}/dpipot-classifier

jobs:
  build-proxy:
    name: build proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout
        uses: actions/checkout@v4.2.2

      - name: login no ghcr.io
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extrai metadata
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: configura buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: go mod tidy
        run: |
          cd proxy
          go mod tidy
          go mod download

      - name: verify proxy build
        run: |
          cd proxy
          go build -v ./cmd/proxy

      - name: build e push proxy
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./proxy
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

  build-classifier:
    name: build classifier
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout
        uses: actions/checkout@v4.2.2

      - name: login no ghcr.io
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extrai metadata
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.CLASSIFIER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: configura buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: build e push classifier
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./classifier
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
