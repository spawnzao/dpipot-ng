name: build and push images

on:
  push:
    branches:
      - main
    paths:
      - 'proxy/**'
      - 'classifier/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/dpipot-proxy
  CLASSIFIER_IMAGE: ghcr.io/${{ github.repository_owner }}/dpipot-classifier

jobs:
  # ── build do proxy Go ─────────────────────────────────────────────
  build-proxy:
    name: build proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necessário para push no ghcr.io

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # token automático do Actions

      - name: extrai metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: configura buildx
        uses: docker/setup-buildx-action@v3

      - name: build e push proxy
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache entre builds — acelera muito o build do Go
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── build do classifier C + nDPI ──────────────────────────────────
  build-classifier:
    name: build classifier
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extrai metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CLASSIFIER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: configura buildx
        uses: docker/setup-buildx-action@v3

      - name: build e push classifier
        uses: docker/build-push-action@v5
        with:
          context: ./classifier
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # classifier compila o nDPI do git — cache é essencial
          cache-from: type=gha
          cache-to: type=gha,mode=max
