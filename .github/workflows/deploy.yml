name: deploy

on:
  # roda automaticamente após o build terminar com sucesso na main
  workflow_run:
    workflows: ["build and push images"]
    types:
      - completed
    branches:
      - main

  # permite rodar manualmente pelo GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: deploy no microk8s
    runs-on: self-hosted   # runner rodando na máquina com microk8s ou k3s
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: detect orchestrator
        run: |
          if command -v k3s &>/dev/null; then
            echo "KUBECTL=kubectl" >> $GITHUB_ENV
            echo "HELM=helm" >> $GITHUB_ENV
            echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
            echo "API_URL=https://127.0.0.1:6443" >> $GITHUB_ENV
            echo "orchestrator=k3s" >> $GITHUB_ENV
            echo "✅ orchestrator: k3s"
          else
            echo "KUBECTL=microk8s kubectl" >> $GITHUB_ENV
            echo "HELM=microk8s helm" >> $GITHUB_ENV
            echo "API_URL=https://127.0.0.1:16443" >> $GITHUB_ENV
            echo "orchestrator=microk8s" >> $GITHUB_ENV
            echo "✅ orchestrator: microk8s"
          fi

      - name: wait for cluster
        run: |
          echo "=== Checking cluster API ==="
          curl -k ${{ env.API_URL }}/healthz || true

          echo "=== Checking kubectl ==="
          $KUBECTL version --client || true

          for i in {1..30}; do
            if $KUBECTL get nodes &>/dev/null; then
              echo "Cluster is ready"
              exit 0
            fi
            echo "Waiting for cluster API... ($i/30)"
            sleep 2
          done
          echo "Cluster API not available"
          exit 1

      - name: resolve values file
        id: values
        run: |
          HOST=$(hostname -s)
          VALUES_FILE="k8s/chart/values-${HOST}.yaml"
          if [ -f "$VALUES_FILE" ]; then
            echo "✅ using host-specific values file: $VALUES_FILE"
            echo "path=$VALUES_FILE" >> $GITHUB_OUTPUT
          else
            echo "⚠️ no values-${HOST}.yaml found, falling back to values.yaml defaults"
            echo "path=k8s/chart/values.yaml" >> $GITHUB_OUTPUT
          fi

      - name: adota recursos existentes para o Helm
        run: |
          NS=dpipot
          RELEASE=dpipot
          # Recursos namespaced
          for kind in networkpolicies deployments daemonsets services configmaps serviceaccounts persistentvolumeclaims; do
            $KUBECTL label --overwrite -n $NS $kind --all \
              app.kubernetes.io/managed-by=Helm 2>/dev/null || true
            $KUBECTL annotate --overwrite -n $NS $kind --all \
              meta.helm.sh/release-name=$RELEASE \
              meta.helm.sh/release-namespace=$NS 2>/dev/null || true
          done
          # Recursos cluster-scoped (filebeat RBAC)
          for name in filebeat; do
            for kind in clusterroles clusterrolebindings; do
              $KUBECTL label --overwrite $kind $name \
                app.kubernetes.io/managed-by=Helm 2>/dev/null || true
              $KUBECTL annotate --overwrite $kind $name \
                meta.helm.sh/release-name=$RELEASE \
                meta.helm.sh/release-namespace=$NS 2>/dev/null || true
            done
          done

      - name: aplica manifests
        run: |
          $HELM upgrade --install dpipot k8s/chart/ \
            -f ${{ steps.values.outputs.path }} \
            --namespace dpipot --create-namespace

      - name: verifica pods
        run: |
          echo "Aguardando 30 segundos para stabilização..."
          sleep 30
          $KUBECTL get pods -n dpipot -o wide

      - name: verifica pods
        run: |
          $KUBECTL get pods -n dpipot -o wide
