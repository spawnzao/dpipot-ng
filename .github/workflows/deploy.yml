name: deploy

on:
  # roda automaticamente após o build terminar com sucesso na main
  workflow_run:
    workflows: ["build and push images"]
    types:
      - completed
    branches:
      - main

  # permite rodar manualmente pelo GitHub UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'ambiente para deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    name: deploy no microk8s
    runs-on: self-hosted   # runner rodando na sua máquina com microk8s
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: wait for microk8s
        run: |
          echo "=== Checking MicroK8s status ==="
          microk8s status || true
          
          echo "=== Checking API server ==="
          curl -k https://127.0.0.1:16443/healthz || true
          
          echo "=== Checking kubectl ==="
          microk8s kubectl version --client || true
          
          for i in {1..30}; do
            if microk8s kubectl get nodes &>/dev/null; then
              echo "MicroK8s is ready"
              exit 0
            fi
            echo "Waiting for MicroK8s API... ($i/30)"
            sleep 2
          done
          echo "MicroK8s API not available"
          exit 1

      - name: define ambiente
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

      - name: aplica manifests no microk8s
        run: |
          microk8s kubectl apply -k k8s/overlays/${{ steps.env.outputs.target }}

      - name: verifica pods
        run: |
          echo "Aguardando 30 segundos para stabilização..."
          sleep 30
          microk8s kubectl get pods -n dpipot -o wide

      - name: verifica pods
        run: |
          microk8s kubectl get pods -n dpipot -o wide
