---
# RBAC — permissões para o Filebeat ler metadados do cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: dpipot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: dpipot
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: dpipot
data:
  filebeat.yml: |
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          node: ${NODE_NAME}
          # Coleta apenas pods do namespace dpipot — mais eficiente que drop_event
          namespaces:
            - dpipot
          hints.enabled: true
          hints.default_config:
            type: container
            paths:
              - /var/log/pods/*${data.kubernetes.pod.uid}*/${data.kubernetes.container.name}/*.log

    processors:
      # Descarta logs de pods fora do namespace dpipot
      - drop_event:
          when:
            not:
              equals:
                kubernetes.namespace: "dpipot"
      # Decodifica o JSON do stdout (proxy/classifier usam JSON logger)
      # Para logs não-JSON o campo message permanece intacto
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true

    output.logstash:
      hosts: ["logstash.dpipot.svc.cluster.local:5044"]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: dpipot
  labels:
    app: filebeat
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      containers:
        - name: filebeat
          # Mesma versão do Logstash para garantir compatibilidade
          image: docker.elastic.co/beats/filebeat:8.12.0
          args: ["-c", "/etc/filebeat/filebeat.yml", "-e"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: "50m"
              memory: "100Mi"
            limits:
              cpu: "200m"
              memory: "200Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/filebeat/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: filebeat-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
