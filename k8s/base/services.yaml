---
# Cowrie — simula SSH/Telnet
apiVersion: v1
kind: Service
metadata:
  name: cowrie-svc
  namespace: dpipot
  labels:
    app: cowrie
spec:
  type: ClusterIP
  selector:
    app: cowrie
  ports:
    - name: ssh
      port: 22
      targetPort: 2222    # cowrie escuta em porta alta internamente
      protocol: TCP
    - name: telnet
      port: 23
      targetPort: 2323
      protocol: TCP

---
# Wordpot — honeypot HTTP (fallback/default)
apiVersion: v1
kind: Service
metadata:
  name: wordpot-svc
  namespace: dpipot
  labels:
    app: wordpot
spec:
  type: ClusterIP
  selector:
    app: wordpot
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

---
# Kafka — broker interno para buffer de payloads
apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
  namespace: dpipot
  labels:
    app: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: kafka-internal
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: kafka-external
      port: 9094
      targetPort: 9094
      nodePort: 30092
      protocol: TCP
