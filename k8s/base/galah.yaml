# Galah honeypot - AI-powered honeypot
apiVersion: apps/v1
kind: Deployment
metadata:
  name: galah-deployment
  namespace: dpipot
  labels:
    app: galah
spec:
  replicas: 1
  selector:
    matchLabels:
      app: galah
  template:
    metadata:
      labels:
        app: galah
    spec:
      containers:
      - name: galah
        image: dtagdevsec/galah:24.04.1
        args:
          - "--provider"
          - "openai"
          - "--model"
          - "llama-3.3-70b-versatile"
          - "--base-url"
          - "https://api.groq.com/openai/v1"
          - "--cache-db-file"
          - "/cache/galah_cache.db"
          - "--cache-duration"
          - "24"
        env:
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-api-key
              key: api_key
        ports:
        - containerPort: 8080
        - containerPort: 8443
        - containerPort: 8888
        - containerPort: 443
        volumeMounts:
        - name: galah-cache
          mountPath: /cache
      volumes:
      - name: galah-cache
        persistentVolumeClaim:
          claimName: galah-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: galah-svc
  namespace: dpipot
spec:
  selector:
    app: galah
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: https-alt
      protocol: TCP
      port: 8443
      targetPort: 8443
    - name: http-alt
      protocol: TCP
      port: 8888
      targetPort: 8888
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443