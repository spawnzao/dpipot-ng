# Galah honeypot - AI-powered honeypot
apiVersion: apps/v1
kind: Deployment
metadata:
  name: galah-deployment
  namespace: dpipot
  labels:
    app: galah
spec:
  replicas: 1
  selector:
    matchLabels:
      app: galah
  template:
    metadata:
      labels:
        app: galah
    spec:
      containers:
      - name: galah
        image: dtagdevsec/galah:24.04.1
        command: ["/bin/sh", "-c"]
        args:
          - |
            cp /galah/config/config.yaml /tmp/config.yaml
            cp /galah/config/rules.yaml /tmp/rules.yaml
            /opt/galah/galah \
              --provider=openai \
              --model=llama-3.3-70b-versatile \
              --api-key=$LLM_API_KEY \
              --config-file /tmp/config.yaml \
              --rules-config-file /tmp/rules.yaml \
              --cache-db-file /galah/data/cache.db \
              --cache-duration 24 \
              --event-log-file /galah/data/event_log.json
        env:
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-api-key
              key: api_key
        - name: OPENAI_API_BASE
          value: "https://api.groq.com/openai/v1"
        ports:
        - containerPort: 8080
          name: http
       volumeMounts:
       - name: galah-config
         mountPath: /galah/config
       - name: galah-data
         mountPath: /galah/data
       - name: http-classifier-config
         mountPath: /etc/dpipot
     volumes:
       - name: galah-config
         configMap:
           name: galah-config
       - name: galah-data
         persistentVolumeClaim:
           claimName: galah-cache-pvc
       - name: http-classifier-config
         configMap:
           name: http-classifier-config
---
apiVersion: v1
kind: Service
metadata:
  name: galah-svc
  namespace: dpipot
spec:
  selector:
    app: galah
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080