---
# ── ElasticPot ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticpot
  namespace: dpipot
  labels:
    app: elasticpot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticpot
  template:
    metadata:
      labels:
        app: elasticpot
    spec:
      containers:
        - name: elasticpot
          # imagem pública do ElasticPot disponível no Docker Hub
          image: dtagdevsec/elasticpot:24.04
          ports:
            - containerPort: 9200
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
# ── Cowrie (SSH/Telnet) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cowrie
  namespace: dpipot
  labels:
    app: cowrie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cowrie
  template:
    metadata:
      labels:
        app: cowrie
    spec:
      containers:
        - name: cowrie
          image: cowrie/cowrie:latest
          ports:
            - containerPort: 2222
              protocol: TCP
            - containerPort: 2323
              protocol: TCP
          env:
            - name: COWRIE_TELNET_ENABLED
              value: "yes"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

---
# ── Dionaea (multi-protocolo genérico) ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dionaea
  namespace: dpipot
  labels:
    app: dionaea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dionaea
  template:
    metadata:
      labels:
        app: dionaea
    spec:
      containers:
        - name: dionaea
          image: dtagdevsec/dionaea:24.04.1
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
            - containerPort: 21
              name: ftp
              protocol: TCP
            - containerPort: 445
              name: smb
              protocol: TCP
            - containerPort: 1433
              name: mssql
              protocol: TCP
            - containerPort: 3306
              name: mysql
              protocol: TCP
            - containerPort: 135
              name: epmapper
              protocol: TCP
            - containerPort: 69
              name: tftp
              protocol: UDP
            - containerPort: 5000
              name: upnp
              protocol: TCP
          volumeMounts:
            - name: dionaea-config
              mountPath: /opt/dionaea/etc/dionaea/dionaea.cfg
              subPath: dionaea.cfg
            - name: dionaea-services
              mountPath: /opt/dionaea/etc/dionaea/services-enabled
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: dionaea-config
          configMap:
            name: dionaea-config
        - name: dionaea-services
          configMap:
            name: dionaea-services

---
# ── Mailoney (SMTP honeypot) ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailoney
  namespace: dpipot
  labels:
    app: mailoney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailoney
  template:
    metadata:
      labels:
        app: mailoney
    spec:
      containers:
        - name: mailoney
          image: dtagdevsec/mailoney:24.04.1
          ports:
            - containerPort: 25
              protocol: TCP
          env:
            - name: MALWARE_HOST
              value: "0.0.0.0"
            - name: MALWARE_PORT
              value: "25"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
# ── Wordpot (HTTP honeypot) ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpot
  namespace: dpipot
  labels:
    app: wordpot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpot
  template:
    metadata:
      labels:
        app: wordpot
    spec:
      containers:
        - name: wordpot
          image: dtagdevsec/wordpot:24.04.1
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: wordpot-logs
              mountPath: /opt/wordpot/logs
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      securityContext:
        runAsUser: 0
      volumes:
        - name: wordpot-logs
          emptyDir: {}

