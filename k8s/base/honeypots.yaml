---
# ── Cowrie (SSH/Telnet) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cowrie
  namespace: dpipot
  labels:
    app: cowrie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cowrie
  template:
    metadata:
      labels:
        app: cowrie
    spec:
      containers:
        - name: cowrie
          image: cowrie/cowrie:latest
          ports:
            - containerPort: 2222
              protocol: TCP
            - containerPort: 2323
              protocol: TCP
          env:
            - name: COWRIE_TELNET_ENABLED
              value: "yes"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

---
# ── Wordpot (HTTP honeypot) ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpot
  namespace: dpipot
  labels:
    app: wordpot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpot
  template:
    metadata:
      labels:
        app: wordpot
    spec:
      containers:
        - name: wordpot
          image: dtagdevsec/wordpot:24.04.1
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: wordpot-logs
              mountPath: /opt/wordpot/logs
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      securityContext:
        runAsUser: 0
      volumes:
        - name: wordpot-logs
          emptyDir: {}

