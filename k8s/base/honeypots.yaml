---
# ── Cowrie (SSH/Telnet) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cowrie
  namespace: dpipot
  labels:
    app: cowrie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cowrie
  template:
    metadata:
      labels:
        app: cowrie
    spec:
      containers:
        - name: cowrie
          image: cowrie/cowrie:latest
          ports:
            - containerPort: 2222
              protocol: TCP
            - containerPort: 2323
              protocol: TCP
          env:
            - name: COWRIE_TELNET_ENABLED
              value: "yes"
          volumeMounts:
            - name: cowrie-logs
              mountPath: /home/cowrie/var/log/cowrie
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        # Sidecar: streams cowrie.json to stdout so Filebeat can collect it.
        # Cowrie logs to files by default; this is the standard K8s pattern
        # for containers that don't write to stdout.
        - name: cowrie-logs
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              until [ -f /logs/cowrie.json ]; do sleep 1; done
              exec tail -n +1 -F /logs/cowrie.json
          volumeMounts:
            - name: cowrie-logs
              mountPath: /logs
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: cowrie-logs
          emptyDir: {}

---
# ── Wordpot (HTTP honeypot) ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpot
  namespace: dpipot
  labels:
    app: wordpot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpot
  template:
    metadata:
      labels:
        app: wordpot
    spec:
      containers:
        - name: wordpot
          image: dtagdevsec/wordpot:24.04.1
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: wordpot-logs
              mountPath: /opt/wordpot/logs
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        # Sidecar: streams wordpot.log to stdout so Filebeat can collect it.
        - name: wordpot-logs
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              until [ -f /logs/wordpot.log ]; do sleep 1; done
              exec tail -n +1 -F /logs/wordpot.log
          volumeMounts:
            - name: wordpot-logs
              mountPath: /logs
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      securityContext:
        runAsUser: 0
      volumes:
        - name: wordpot-logs
          emptyDir: {}
