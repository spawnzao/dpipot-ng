apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dpipot

resources:
  - namespace.yaml
  - configmap.yaml
  - services.yaml
  - network-policy.yaml
  - daemonset-proxy.yaml
  - honeypots.yaml
  - kafka.yaml
  - logstash.yaml
  - dionaea-config.yaml
  - dionaea-www.yaml
  - mariadb-deployment.yaml
  - mariadb-service.yaml
  - heralding-config.yaml
  - heralding-deployment.yaml
  - heralding-service.yaml



images:
  - name: ghcr.io/spawnzao/dpipot-proxy
    newTag: latest
  - name: ghcr.io/spawnzao/dpipot-classifier
    newTag: latest
  - name: ubuntu
    newName: docker.io/library/ubuntu

secretGenerator:
  - name: mariadb-secret
    literals:
      - root-password=root123