apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dpipot-proxy
  namespace: dpipot
  labels:
    app: dpipot-proxy
spec:
  selector:
    matchLabels:
      app: dpipot-proxy
  template:
    metadata:
      labels:
        app: dpipot-proxy
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: iptables-setup
          image: docker.io/library/ubuntu:24.04
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e

              apt-get update --fix-missing || apt-get update || true

              apt-get install -y --no-install-recommends iptables iproute2 || true
              
              # Habilitar IP forwarding
              sysctl -w net.ipv4.ip_forward=1
              sysctl -w net.ipv4.conf.all.rp_filter=0
              sysctl -w net.ipv4.conf.default.rp_filter=0
              
              # Habilitar route_localnet para TPROXY
              sysctl -w net.ipv4.conf.all.route_localnet=1
              sysctl -w net.ipv4.conf.default.route_localnet=1
              
              # Criar tabela de roteamento local para TPROXY
              echo "=== Configurando ip rule e route ==="
              # Criar diretório se não existir
              mkdir -p /etc/iproute2
              # Adicionar tabela 100 se não existir
              grep -q "100" /etc/iproute2/rt_tables || echo "100 tproxy" >> /etc/iproute2/rt_tables
              
              ip rule del fwmark 0x1 lookup 100 2>&1 || true
              ip rule add fwmark 0x1 lookup 100 2>&1 || echo "FALHA: ip rule add"
              ip rule list | grep fwmark || echo "FALHA: regra nao encontrada"
              
              ip route del local default dev lo table 100 2>&1 || true
              ip route add local default dev lo table 100 2>&1 || echo "FALHA: ip route add"
              ip route list table 100 2>&1 || echo "FALHA: rota nao encontrada"
              
              # Limpar regras existentes
              iptables -t mangle -F TEST-TPROXY 2>/dev/null || true
              iptables -t mangle -X TEST-TPROXY 2>/dev/null || true
              
              # Criar chain
              iptables -t mangle -N TEST-TPROXY || true
              
              # Marcar pacotes destinados às portas 50000-55000 APENAS da interface ens192 (darknet)
              iptables -t mangle -A TEST-TPROXY -i ens192 -p tcp --dport 50000:55000 -j MARK --set-mark 0x1
              
              # TPROXY: redirecionar para proxy na porta 8080
              # O TPROXY preserva o IP e porta originais!
              iptables -t mangle -A TEST-TPROXY -i ens192 -p tcp --dport 50000:55000 -j TPROXY --tproxy-mark 0x1/0x1 --on-port 8080
              
              # Remover regra existente da PREROUTING antes de adicionar
              iptables -t mangle -D PREROUTING -p tcp -j TEST-TPROXY 2>/dev/null || true
              
              # Aplicar na PREROUTING (antes do routing decision)
              iptables -t mangle -A PREROUTING -p tcp -j TEST-TPROXY
              
              echo "iptables TPROXY: portas 50000-55000 -> proxy:8080 (apenas ens192)"
              echo "Regras mangle ativas:"
              iptables -t mangle -L TEST-TPROXY -n || true
              
              # Sair para permitir que o resto do pod inicie
              echo "Init concluído!"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
              drop:
                - ALL
            privileged: true
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0

      containers:
        # ── container: TCP proxy (Go) com nDPI integrado via CGO ─────────────────────
        - name: proxy
          image: ghcr.io/spawnzao/dpipot-proxy:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CLASSIFIER_ENABLED
              value: "true"
            - name: CLASSIFIER_HOST
              value: "127.0.0.1"
            - name: CLASSIFIER_PORT
              value: "9090"
          envFrom:
            - configMapRef:
                name: dpipot-config
          ports:
            - name: proxy
              containerPort: 8080
              hostPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0

        # ── container: Classifier (AF_PACKET + nDPI) ────────────────────────────────
        - name: classifier
          image: ghcr.io/spawnzao/dpipot-classifier:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-interface=ens192"
            - "-listen=127.0.0.1:9090"
            - "-ttl=5"
            - "-log=debug"
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0

      volumes:
        - name: ndpi-socket
          emptyDir: {}

      terminationGracePeriodSeconds: 30

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule