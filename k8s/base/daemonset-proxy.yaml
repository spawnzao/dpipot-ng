apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dpipot-proxy
  namespace: dpipot
  labels:
    app: dpipot-proxy
spec:
  selector:
    matchLabels:
      app: dpipot-proxy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: dpipot-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: iptables-setup
          image: ubuntu:24.04
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -e
              
              apt-get update && apt-get install -y iptables
              
              # Habilitar IP forwarding
              sysctl -w net.ipv4.ip_forward=1
              sysctl -w net.ipv4.conf.all.rp_filter=0
              sysctl -w net.ipv4.conf.default.rp_filter=0
              
              # Limpar regras existentes
              iptables -t mangle -F TEST-TPROXY 2>/dev/null || true
              iptables -t mangle -X TEST-TPROXY 2>/dev/null || true
              
              # Criar chain
              iptables -t mangle -N TEST-TPROXY || true
              
              # Marcar pacotes destinados às portas 50000-55000
              iptables -t mangle -A TEST-TPROXY -p tcp --dport 50000:55000 -j MARK --set-mark 0x1
              
              # TPROXY: redirecionar para proxy na porta 8080
              # O TPROXY preserva o IP e porta originais!
              iptables -t mangle -A TEST-TPROXY -p tcp --dport 50000:55000 -j TPROXY --tproxy-mark 0x1 --on-port 8080 --on-ip 127.0.0.1
              
              # Aplicar na PREROUTING (antes do routing decision)
              iptables -t mangle -A PREROUTING -p tcp -j TEST-TPROXY
              
              echo "iptables TPROXY: portas 50000-55000 -> proxy:8080"
              echo "Regras mangle ativas:"
              iptables -t mangle -L TEST-TPROXY -n || true
              
              # Sair para permitir que o resto do pod inicie
              echo "Init concluído!"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
              drop:
                - ALL
            privileged: true
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0

      containers:
        # ── container 1: nDPI sidecar (C) ────────────────────────────
        # sobe primeiro na lista para criar o socket antes do proxy tentar conectar
        - name: ndpi-classifier
          image: ghcr.io/spawnzao/dpipot-classifier:latest
          imagePullPolicy: Always
          args:
            - /var/run/dpipot/ndpi.sock
          volumeMounts:
            - name: ndpi-socket
              mountPath: /var/run/dpipot
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - test
                - -S
                - /var/run/dpipot/ndpi.sock
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001

        # ── container 2: TCP proxy (Go) ──────────────────────────────
        - name: proxy
          image: ghcr.io/spawnzao/dpipot-proxy:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: dpipot-config
          ports:
            - name: proxy
              containerPort: 8080
              hostPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: ndpi-socket
              mountPath: /var/run/dpipot
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000

      volumes:
        - name: ndpi-socket
          emptyDir: {}

      terminationGracePeriodSeconds: 30

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule