apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dpipot-proxy
  namespace: dpipot
  labels:
    app: dpipot-proxy
spec:
  selector:
    matchLabels:
      app: dpipot-proxy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: dpipot-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # initContainer removido — causava deadlock porque o sidecar nDPI
      # só sobe depois do initContainer terminar. A espera pelo socket
      # é feita internamente pelo waitForNDPI() no main.go do proxy.

      containers:
        # ── container 1: nDPI sidecar (C) ────────────────────────────
        # sobe primeiro na lista para criar o socket antes do proxy tentar conectar
        - name: ndpi-classifier
          image: ghcr.io/spawnzao/dpipot-classifier:latest
          imagePullPolicy: Always
          args:
            - /var/run/dpipot/ndpi.sock
          volumeMounts:
            - name: ndpi-socket
              mountPath: /var/run/dpipot
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - test
                - -S
                - /var/run/dpipot/ndpi.sock
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001

        # ── container 2: TCP proxy (Go) ──────────────────────────────
        - name: proxy
          image: ghcr.io/spawnzao/dpipot-proxy:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: dpipot-config
          ports:
            - name: proxy
              containerPort: 8080
              hostPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: ndpi-socket
              mountPath: /var/run/dpipot
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000

      volumes:
        - name: ndpi-socket
          emptyDir: {}

      terminationGracePeriodSeconds: 30

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule