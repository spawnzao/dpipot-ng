apiVersion: v1
kind: ConfigMap
metadata:
  name: dpipot-config
  namespace: dpipot
data:
  PROXY_LISTEN_ADDR: "0.0.0.0:8080"
  CERTS_PATH: "/certs"
  NDPI_SOCKET_PATH: "/var/run/dpipot/ndpi.sock"
  NDPI_TIMEOUT: "5000ms"
  HONEYPOT_ROUTES: >-
    HTTP=wordpot-svc:80,
    SSH=cowrie-svc:22,
    FTP=dionaea-svc:21,
    SMTP=dionaea-svc:25,
    IMAP=dionaea-svc:143,
    SIP=dionaea-svc:5060,
    TLS=dionaea-svc:443,
    MongoDB=mongodbhp-svc:27017
  DEFAULT_ROUTE: "wordpot-svc:80"
  KAFKA_BROKERS: "kafka-svc.dpipot.svc.cluster.local:9092"
  KAFKA_TOPIC: "dpipot.events"
  MAX_PAYLOAD_BYTES: "0"
  LOG_LEVEL: "debug"