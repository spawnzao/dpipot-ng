---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: dpipot
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false
  pipelines.yml: |
    - pipeline.id: kafka-to-elasticsearch
      path.config: "/usr/share/logstash/pipeline/kafka-to-elasticsearch.conf"
  kafka-to-elasticsearch.conf: |
    input {
      kafka {
        bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
        topics_pattern => "dpipot.events.*"
        group_id => "logstash-consumer"
        auto_offset_reset => "earliest"
        codec => "json"
      }
    }
    output {
      if [topic] =~ "debug" {
        elasticsearch {
          hosts => ["${ELASTICSEARCH_HOST}"]
          index => "logs-debug-%{+YYYY.MM.dd}"
          user => "${ELASTICSEARCH_USER}"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          cacert => "/usr/share/logstash/config/certs/ca.crt"
        }
      } else {
        elasticsearch {
          hosts => ["${ELASTICSEARCH_HOST}"]
          index => "logs-application-%{+YYYY.MM.dd}"
          user => "${ELASTICSEARCH_USER}"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          cacert => "/usr/share/logstash/config/certs/ca.crt"
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: dpipot
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      hostAliases:
        - ip: "10.88.88.1"
          hostnames:
            - "elasticsearch"
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "=== Debug: Testing network ==="
              ip route show
              echo "=== Testing DNS ==="
              nslookup 10.88.88.1 || echo "DNS lookup failed, trying ping"
              echo "=== Testing ICMP ==="
              ping -c 2 10.88.88.1 || echo "Ping failed"
              echo "=== Testing HTTPS ==="
              wget -q -O /dev/null --no-check-certificate --timeout=10 https://elastic:${ELASTIC_PASSWORD}@10.88.88.1:9200 || echo "WGET failed"
              echo "=== Ready! ==="
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logstash-elasticsearch-secrets
                  key: ELASTIC_PASSWORD
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.12.0
          ports:
            - containerPort: 5044
              protocol: TCP
            - containerPort: 9600
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-svc.dpipot.svc.cluster.local:9092"
            - name: ELASTICSEARCH_HOST
              valueFrom:
                secretKeyRef:
                  name: logstash-elasticsearch-secrets
                  key: ELASTICSEARCH_HOST
            - name: ELASTICSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: logstash-elasticsearch-secrets
                  key: ELASTICSEARCH_USER
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logstash-elasticsearch-secrets
                  key: ELASTIC_PASSWORD
          volumeMounts:
            - name: logstash-config
              mountPath: /usr/share/logstash/config
              readOnly: true
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline
            - name: elastic-certs
              mountPath: /usr/share/logstash/config/certs
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: logstash-config
          configMap:
            name: logstash-config
            items:
              - key: logstash.yml
                path: logstash.yml
              - key: pipelines.yml
                path: pipelines.yml
        - name: logstash-pipeline
          configMap:
            name: logstash-config
            items:
              - key: kafka-to-elasticsearch.conf
                path: kafka-to-elasticsearch.conf
        - name: elastic-certs
          secret:
            secretName: elastic-certs