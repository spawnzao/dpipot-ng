---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: dpipot
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false

  pipelines.yml: |
    - pipeline.id: kafka-to-elasticsearch
      path.config: "/usr/share/logstash/pipeline/kafka-to-elasticsearch.conf"
    - pipeline.id: kubernetes-logs
      path.config: "/usr/share/logstash/pipeline/kubernetes-logs.conf"

  kafka-to-elasticsearch.conf: |
    input {
      kafka {
        bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
        topics_pattern => "dpipot.events.*"
        group_id => "logstash-consumer"
        auto_offset_reset => "earliest"
        codec => "json"
      }
    }
    output {
      if [instance] == "proxy" {
        elasticsearch {
          hosts => ["${ELASTICSEARCH_HOST}"]
          index => "dpipot-proxy-%{+YYYY.MM.dd}"
          action => "create"
          manage_template => false
          user => "${ELASTICSEARCH_USER}"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          cacert => "/usr/share/logstash/config/certs/ca.crt"
        }
      } else if [instance] == "classifier" {
        elasticsearch {
          hosts => ["${ELASTICSEARCH_HOST}"]
          index => "dpipot-classifier-%{+YYYY.MM.dd}"
          action => "create"
          manage_template => false
          user => "${ELASTICSEARCH_USER}"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          cacert => "/usr/share/logstash/config/certs/ca.crt"
        }
      } else {
        elasticsearch {
          hosts => ["${ELASTICSEARCH_HOST}"]
          index => "dpipot-unknown-%{+YYYY.MM.dd}"
          action => "create"
          manage_template => false
          user => "${ELASTICSEARCH_USER}"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          cacert => "/usr/share/logstash/config/certs/ca.crt"
        }
      }
    }

  kubernetes-logs.conf: |
    input {
      beats {
        port => 5044
      }
    }
    filter {
      # Remove campos internos do Filebeat/ECS desnecessários no ES
      mutate {
        remove_field => ["agent", "ecs", "input", "tags", "@version", "service"]
      }

      # Só remove o campo "message" (JSON bruto) quando o decode já produziu "msg"
      # — preserva a mensagem original para logs não-JSON (cowrie, kafka, etc.)
      if [msg] {
        mutate { remove_field => ["message"] }
      }

      # Usa o campo "ts" da app como @timestamp; só aplica quando o campo existe
      if [ts] {
        date {
          match => ["ts", "ISO8601"]
          target => "@timestamp"
          remove_field => ["ts"]
        }
      }

      # Normaliza level para minúsculo (evita índices com uppercase inválidos no ES)
      if [level] {
        mutate { lowercase => ["level"] }
      }
    }
    output {
      if [kubernetes][container][name] in ["proxy", "classifier"] {
        elasticsearch {
          hosts           => ["${ELASTICSEARCH_HOST}"]
          index           => "dpipot-app-%{+YYYY.MM.dd}"
          action          => "create"
          manage_template => false
          user            => "${ELASTICSEARCH_USER}"
          password        => "${ELASTIC_PASSWORD}"
          ssl             => true
          cacert          => "/usr/share/logstash/config/certs/ca.crt"
        }
      } else if [kubernetes][container][name] in ["logstash", "filebeat", "promtail", "kafka"] {
        elasticsearch {
          hosts           => ["${ELASTICSEARCH_HOST}"]
          index           => "dpipot-infra-%{+YYYY.MM.dd}"
          action          => "create"
          manage_template => false
          user            => "${ELASTICSEARCH_USER}"
          password        => "${ELASTIC_PASSWORD}"
          ssl             => true
          cacert          => "/usr/share/logstash/config/certs/ca.crt"
        }
      } else {
        elasticsearch {
          hosts           => ["${ELASTICSEARCH_HOST}"]
          index           => "dpipot-pods-%{+YYYY.MM.dd}"
          action          => "create"
          manage_template => false
          user            => "${ELASTICSEARCH_USER}"
          password        => "${ELASTIC_PASSWORD}"
          ssl             => true
          cacert          => "/usr/share/logstash/config/certs/ca.crt"
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: dpipot
spec:
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
    - name: http
      port: 9600
      targetPort: 9600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: dpipot
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.12.0
          ports:
            - containerPort: 5044
              protocol: TCP
            - containerPort: 9600
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-svc.dpipot.svc.cluster.local:9092"
            - name: ELASTICSEARCH_HOST
              valueFrom:
                secretKeyRef:
                  name: logstash-elasticsearch-secrets
                  key: ELASTICSEARCH_HOST
            - name: ELASTICSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: logstash-elasticsearch-secrets
                  key: ELASTICSEARCH_USER
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logstash-elasticsearch-secrets
                  key: ELASTIC_PASSWORD
          volumeMounts:
            - name: logstash-config
              mountPath: /usr/share/logstash/config
              readOnly: true
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline
            - name: elastic-certs
              mountPath: /usr/share/logstash/config/certs
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: logstash-config
          configMap:
            name: logstash-config
            items:
              - key: logstash.yml
                path: logstash.yml
              - key: pipelines.yml
                path: pipelines.yml
        - name: logstash-pipeline
          configMap:
            name: logstash-config
            items:
              - key: kafka-to-elasticsearch.conf
                path: kafka-to-elasticsearch.conf
              - key: kubernetes-logs.conf
                path: kubernetes-logs.conf
        - name: elastic-certs
          secret:
            secretName: elastic-certs
