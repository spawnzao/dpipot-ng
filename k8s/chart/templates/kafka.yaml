{{- if .Values.kafka.enabled }}
{{- if .Values.kafka.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc
  namespace: dpipot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.kafka.persistence.size }}
  storageClassName: {{ .Values.kafka.persistence.storageClass }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: dpipot
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
              protocol: TCP
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-svc.dpipot.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_LOG_RETENTION_BYTES
              value: "10737418240"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    until /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1; do
                      sleep 3
                    done
                    sleep 5
                    for topic in dpipot.events-application dpipot.events-ndpi; do
                      /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 \
                        --create --if-not-exists --topic "$topic" \
                        --partitions 1 --replication-factor 1
                    done
          resources:
            requests:
              cpu: {{ .Values.resources.kafka.requests.cpu }}
              memory: {{ .Values.resources.kafka.requests.memory }}
            limits:
              cpu: {{ .Values.resources.kafka.limits.cpu }}
              memory: {{ .Values.resources.kafka.limits.memory }}
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-data
          {{- if .Values.kafka.persistence.enabled }}
          persistentVolumeClaim:
            claimName: kafka-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
