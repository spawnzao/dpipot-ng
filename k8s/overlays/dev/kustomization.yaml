apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dpipot

resources:
  - ../../base

# dev usa tag "main" — atualizada a cada push na branch main
images:
  - name: ghcr.io/spawnzao/dpipot-proxy
    newTag: main
  - name: ghcr.io/spawnzao/dpipot-classifier
    newTag: main

patches:
  # log mais verbose em dev
  - patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: dpipot-proxy
        namespace: dpipot
      spec:
        template:
          spec:
            containers:
              - name: proxy
                imagePullPolicy: Always
                env:
                  - name: LOG_LEVEL
                    value: "debug"
              - name: ndpi-classifier
                imagePullPolicy: Always

  # Kafka mais leve em dev
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kafka
        namespace: dpipot
      spec:
        template:
          spec:
            containers:
              - name: kafka
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
