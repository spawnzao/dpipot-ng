apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dpipot

resources:
  - ../../base
  - kafka-pvc.yaml      # PVC novo — precisa ser resource, não patch
  - pvc-cache.yaml     # PVC novo — precisa ser resource, não patch
  - secrets/galah-secrets.yaml

# imagens com tag latest
images:
  - name: ghcr.io/spawnzao/dpipot-proxy
    newTag: "latest"
  - name: ghcr.io/spawnzao/dpipot-classifier
    newTag: "latest"

# substitui o emptyDir do Kafka pela PVC e aumenta memória
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kafka
        namespace: dpipot
      spec:
        template:
          spec:
            volumes:
              - name: kafka-data
                emptyDir: null
                persistentVolumeClaim:
                  claimName: kafka-pvc
            containers:
              - name: kafka
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 1000m
                    memory: 2Gi
  - patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: dpipot-proxy
        namespace: dpipot
      spec:
        template:
          spec:
            containers:
              - name: proxy
                imagePullPolicy: "Always"
              - name: classifier
                imagePullPolicy: "Always"

